<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />

    <title>ქიმია და ინგლისური</title>

    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
        margin: 0;
        background-color: #3477eb;
      }

      /* HEADER */

      /* GRID */
      .projects {
        width: 95%;
        max-width: 1200px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      /* CARD */
      .project {
        background: white;
        padding: 15px;
        border-radius: 8px;
        transition: 0.3s;
      }

      /* IMAGE */
      .project img {
        width: 100%;
        height: 460px;
        object-fit: cover;
        transition: 0.3s;
      }

      /* HOVER EFFECT */
      .project:hover {
        transform: translateY(-6px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .project:hover img {
        transform: scale(1.05);
      }

      /* BUTTON */
      .download-button {
        display: inline-block;
        padding: 10px 20px;
        background: #16b787;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.3s;
      }

      .download-button:hover {
        background: #16b787;
      }

      /* FOOTER */
      footer {
        background: black;
        color: white;
        padding: 20px;
        text-align: center;
      }

      /* 📱 TABLET */
      @media (max-width: 900px) {
        .projects {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* 📱 MOBILE */
      @media (max-width: 600px) {
        .projects {
          grid-template-columns: 1fr;
        }

        .project img {
          height:450px;
        }

        h1 {
          font-size: 20px;
        }
      }

      .header {
        background: linear-gradient(135deg, #1e38cd, #1d34b8);
        color: white;
        padding: 20px 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border-radius: 0 0 20px 20px;
      }

      /* სათაური */
      .header h1 {
        font-size: 18px;
        text-align: center;
        margin: 0;
        padding: 0 50px; /* 👉 ეს აშორებს ტექსტს ისრისგან */
      }
      .back-btn {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        text-decoration: none;
        color: white;
        font-size: 18px;
        background: rgba(20, 73, 235, 0.2);
        padding: 8px 12px;
        border-radius: 50%;
        transition: 0.3s;
      }

      /* hover */
      .back-btn:hover {
        background: #ff4d4d;
      }
      .center-btn {
        display: block;
        margin: 20px auto;
        text-align: center;
      }
      #videos {
        display: none;
        margin: 20px;
      }

      /* როცა გამოჩნდება */
      #videos.active {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 👉 ზუსტად 2 გვერდიგვერდ */
        gap: 30px;
        justify-items: center;
      }
      /* ვიდეო ზომა */
      #videos video {
        width: 100%;
        max-width: 400px; /* 👉 აქ ზრდი ზომას (350-500 შეგიძლია) */
        aspect-ratio: 9 / 16; /* 👉 TikTok ფორმა */
        object-fit: cover;
        border-radius: 10px;
      }
      @media (max-width: 900px) {
        #videos.active {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 600px) {
        #videos.active {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <script>
    function toggleVideos() {
      var videos = document.getElementById("videos");
      var btn = document.getElementById("btn");

      videos.classList.toggle("active");

      if (videos.classList.contains("active")) {
        btn.innerText = "ვიდეოების დამალვა";
      } else {
        btn.innerText = "ვიდეოების ნახვა";
      }
    }
