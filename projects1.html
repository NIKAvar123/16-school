<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>გეოგრაფია,ისტორია და სამხედრო</title>
    <link rel="shortcut icon" href="./16 school.jpg" type="image/x-icon">
    <link rel="shortcut icon" href="./16 school.jpg" type="image/x-icon" />
    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
        margin: 0;
        background-color: #3477eb;
      }

      /* HEADER */
      .header {
        background: #0118e1;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 20px;
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
      }

      /* GRID */
      .projects {
        width: 95%;
        max-width: 1200px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      /* CARD */
      .project {
        background: white;
        padding: 15px;
        border-radius: 8px;
        transition: 0.3s;
      }

      /* IMAGE */
      .project img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: 0.3s;
      }

      /* HOVER */
      .project:hover {
        transform: translateY(-6px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .project:hover img {
        transform: scale(1.05);
      }

      /* BUTTONS */
      .download-button {
        display: inline-block;
        padding: 10px 15px;
        margin: 5px;
        background: #1dc44a;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.3s;
      }

      .download-button:hover {
        background: #149c38;
      }

      /* FOOTER */
      footer {
        background: black;
        color: white;
        padding: 20px;
        text-align: center;
      }

      /* 📱 TABLET */
      @media (max-width: 900px) {
        .projects {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* 📱 MOBILE */
      @media (max-width: 600px) {
        .projects {
          grid-template-columns: 1fr;
        }

        .project img {
          height: 180px;
        }

        h1 {
          font-size: 15.5px;
        }
      }

      .header {
        background: linear-gradient(135deg, #1e38cd, #1d34b8);
        color: white;
        padding: 20px 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border-radius: 0 0 20px 20px;
      }

      /* სათაური */
      .header h1 {
        font-size: 18px;
        text-align: center;
        margin: 0;
        padding: 0 50px; /* 👉 ეს აშორებს ტექსტს ისრისგან */
      }
      .back-btn {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        text-decoration: none;
        color: white;
        font-size: 18px;
        background: rgba(20, 73, 235, 0.2);
        padding: 8px 12px;
        border-radius: 50%;
        transition: 0.3s;
      }

      /* hover */
      .back-btn:hover {
        background: #ff4d4d;
      }
    </style>
  </head>

  <body>
    <header class="header">
      <a href="./index.html" class="back-btn">←</a>
      <h1>გეოგრაფია, ისტორია და სამხედრო</h1>
    </header>

    <div class="projects">
      <div class="project">
        <img src="./download9.jpg" alt="პროექტი 1" />
      </div>

      <div class="project">
        <img src="./download10.jpg" alt="პროექტი 2" />
      </div>

      <div class="project">
        <img src="./download11.jpg" alt="პროექტი 3" />
      </div>

      <div class="project">
        <img src="./download12.jpg" alt="პროექტი 4" />
      </div>

      <div class="project">
        <img src="./istoria.jpg" alt="პროექტი 5" />
      </div>
    </div>

    <footer>
      <h2>პრეზენტაციების სრულად სანახავად ჩამოტვირთეთ PDF</h2>

      <a class="download-button" href="./ატომური იარაღი.pdf" download
        >ისტორია PDF</a
      >
      <a class="download-button" href="./geografia(pdfgear.com).pdf" download
        >გეოგრაფია PDF</a
      >
      <a class="download-button" href="./samxedro1(pdfgear.com).pdf" download
        >სამხედრო PDF</a
      >
    </footer>
  </body>
</html>
