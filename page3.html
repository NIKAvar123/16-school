 .nav {

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    background-color:  #3477eb;
}

/* HEADER */
.header {
    background: #0118e1;
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 20px;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-size: 16px;
}

/* MAIN */
.container {
    width: 95%;
    max-width: 1200px;
    margin: 30px auto;
    display: flex;
    gap: 20px;
}
/* LEFT CONTENT */
.content {
    flex: 3;
}

.section-title {
    border-bottom: 3px solid #ff0000;
    padding-bottom: 10px;
    margin-bottom: 20px;
    font-weight: bold;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}
.card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    text-decoration: none;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card-title {
    font-weight: bold;
    margin-bottom: 10px;
}

.card-text {
    font-size: 14px;
    color: #555;
}

/* SIDEBAR */
.sidebar {
    flex: 1;
}


.side-card {
    background: white;
    margin-top: 20px;
    border-radius: 8px;
    overflow: hidden;
}

.side-card img {
    width: 100%;
}

.side-card-text {
    padding: 15px;
}

/* PAGINATION */
.pagination {
    margin-top: 20px;
    text-align: center;
}

.pagination span {
    display: inline-block;
    padding: 8px 12px;
    background: #ddd;
    margin: 3px;
    border-radius: 4px;
    cursor: pointer;
}

.pagination span.active {
    background: #2b7a78;
    color: white;
}
.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}


/* BURGER */
.burger {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* DEFAULT NAV */
.nav {
    display: flex;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    .container {
        width: 95%;
        margin: 15px auto;
    }
}

    .cards {
        flex-direction: column;
    }

    .nav {
        position: absolute;
        top: 70px;
        right: 0;
        background: #1dc44a;
        flex-direction: column;
        width: 200px;
        display: none;
        padding: 15px;
    }

    .nav a {
        margin: 10px 0;
    }

    .nav.active {
        display: flex;
    }

    .burger {
        display: block;
    }
@media (max-width: 900px) {
    .cards {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .cards {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 600px) {

    }

    }

.logo::after {

}

}
