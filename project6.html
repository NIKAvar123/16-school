<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ქიმია, ბიოლოგია და ისტორია</title>

    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
        margin: 0;
        background-color: #3477eb;
      }

      /* HEADER */
      .header {
        background: #0118e1;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 20px;
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
      }

      /* GRID */
      .projects {
        width: 95%;
        max-width: 1200px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      /* CARD */
      .project {
        background: white;
        padding: 15px;
        border-radius: 8px;
        transition: 0.3s;
      }

      /* IMAGE */
      .project img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: 0.3s;
      }

      /* HOVER EFFECT */
      .project:hover {
        transform: translateY(-6px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .project:hover img {
        transform: scale(1.05);
      }

      /* BUTTON */
      .download-button {
        display: inline-block;
        padding: 8px 12px;
        background: #16b787;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: 0.3s;
        margin-right: 0px;
        margin-top: 5px;
      }

      .download-button:hover {
        background: #187559;
      }

      /* FOOTER */
      footer {
        background: black;
        color: white;
        padding: 20px;
        text-align: center;
      }

      /* 📱 TABLET */
      @media (max-width: 900px) {
        .projects {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* 📱 MOBILE */
      @media (max-width: 600px) {
        .projects {
          grid-template-columns: 1fr;
        }

        .project img {
          height: 180px;
        }

        h1 {
          font-size: 17px;
        }
      }
      .header {
        background: linear-gradient(135deg, #1e38cd, #1d34b8);
        color: white;
        padding: 20px 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border-radius: 0 0 20px 20px;
      }

      /* სათაური */
      .header h1 {
        font-size: 18px;
        text-align: center;
        margin: 0;
        padding: 0 50px;
      }
      .back-btn {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        text-decoration: none;
        color: white;
        font-size: 18px;
        background: rgba(20, 73, 235, 0.2);
        padding: 8px 12px;
        border-radius: 50%;
        transition: 0.3s;
      }

      /* hover */
      .back-btn:hover {
        background: #ff4d4d;
      }
            
      #videos {
        display: none;
        margin: 20px;
      }

      /* როცა გამოჩნდება */
#videos.active {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    justify-content: center; /* 👉 ეს აკლდა */
}
      /* ვიდეო ზომა */
#videos video {
    width: 100%;
    max-width: 350px; /* 👉 400 ცოტა დიდია 2 სვეტისთვის */
    aspect-ratio: 9 / 16;
    object-fit: cover;
    border-radius: 12px;
}
      @media (max-width: 900px) {
        #videos.active {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 600px) {
        #videos.active {
          grid-template-columns: 1fr;
        }
      }
      .center-btn {
    display: block;
    margin: 20px auto;
}
      
    </style>
    </style>
  </head>

  <body>
    <header class="header">
      <a href="./page3.html" class="back-btn">←</a>
      <h1>ქიმია, ბიოლოგია და ისტორია</h1>
    </header>

    <div class="projects">
      <div class="project">
        <img src="./pirveli.jpg" alt="" title="project image 1" />
      </div>

      <div class="project">
        <img src="./meore.jpg" alt="" title="project image 2" />
      </div>

      <div class="project">
        <img src="./mesame.jpg" alt="" title="project image 3" />
      </div>

      <div class="project">
        <img src="./meotxe.jpg" alt="" title="project image 4" />
      </div>

      <div class="project">
        <img src="./meeqvse.jpg" alt="" title="project image 6" />
      </div>
    </div>
    <div id="videos">
      <video width="300" controls>
        <source
          src="./biologiaqimiaistoira2.mp4"
          type="video/mp4"
        />
      </video>

      <video width="300" controls>
        <source
          src="./biologiaqimiaistoria1.mp4"
          type="video/mp4"
        />
      </video>
    </div>
<button onclick="toggleVideos()" class="download-button center-btn" id="btn">
ვიდეოების ნახვა
</button>
    <footer>
      <h2>პრეზენტაციის სრულად სანახავად ჩამოტვირთეთ PDF</h2>

      <a class="download-button" href="./qimia (1)(pdfgear.com).pdf" download>
        ქიმია
      </a>
      <a
        class="download-button"
        href="./Presentation-7(pdfgear.com).pdf"
        download
      >
        ბიოლოგია
      </a>

      <a
        class="download-button"
        href="./istoria1 (2)(pdfgear.com).pdf"
        download
      >
        ისტორია
      </a>

      <a
        class="download-button"
        href="./ქოლერა-პრეზენტაცია-2(pdfgear.com).pdf"
        download
      >
        ქოლერას შესახებ
      </a>
    </footer>
  </body>
<script>
function toggleVideos() {
  var videos = document.getElementById("videos");
  var btn = document.getElementById("btn");

  videos.classList.toggle("active");

  if (videos.classList.contains("active")) {
    btn.innerText = "ვიდეოების დამალვა";
  } else {
    btn.innerText = "ვიდეოების ნახვა";
  }
}
</script>
</html>
